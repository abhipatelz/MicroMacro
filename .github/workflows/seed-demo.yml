# Re-seed the demo (preview) database on every push to main.
#
# The demo workspace exists so you can showcase Pragati, run sales demos, or
# manually test newly-merged features without ever touching production data.
# Vercel's "Preview" deployment automatically tracks the same code as prod;
# this workflow just keeps the *data* in the demo Mongo cluster fresh.
#
# Setup (one-time, in repo Settings → Secrets and variables → Actions):
#   DEMO_MONGODB_URI        — connection string for the demo Mongo cluster
#                             (a separate cluster or database from prod).
#   DEMO_DB_HOST_HINT       — substring that uniquely identifies the demo URI
#                             (e.g. "preview" or "demo"). The seed script
#                             refuses to run unless DEMO_MONGODB_URI contains
#                             this string. Belt + braces against prod
#                             accidents.
#
# Setup (one-time, in Vercel project → Settings → Environment Variables):
#   Add the same DEMO_MONGODB_URI as MONGODB_URI on the "Preview" environment
#   only. That makes preview deployments read from the demo cluster while
#   production keeps its own MONGODB_URI on "Production".
#
# Result: every push to main → Vercel rebuilds preview against latest code →
# this workflow rebuilds the demo data → demo URL shows the new feature
# against a clean, realistic dataset.

name: Seed demo database

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch: {}

concurrency:
  # One re-seed at a time. If a newer commit lands while we're seeding, the
  # in-flight run is cancelled so the latest code's seed wins.
  group: seed-demo
  cancel-in-progress: true

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ vars.SEED_DEMO_ENABLED == 'true' || secrets.DEMO_MONGODB_URI != '' }}
    env:
      MONGODB_URI:        ${{ secrets.DEMO_MONGODB_URI }}
      DEMO_DB_HOST_HINT:  ${{ secrets.DEMO_DB_HOST_HINT }}
      # The seed script imports modules that pull JWT_SECRET via env. Any
      # non-empty placeholder is fine — the script never signs a token.
      JWT_SECRET:         seed-demo-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Re-seed demo workspace
        run: npm run seed:demo
