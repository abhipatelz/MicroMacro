<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Matches PragatiMark's tile gradient (135°, same three stops) so the
         tab-bar favicon and the in-app logo read as the same mark. -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1565C0"/>
      <stop offset="45%"  stop-color="#1769C8"/>
      <stop offset="100%" stop-color="#2B8C29"/>
    </linearGradient>
    <!-- Glossy top-left highlight, same as the in-app mark's inner ring. -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="17" fill="url(#bg)"/>
  <!-- Inner glossy ring (inset 2.5px, radius scaled) to match PragatiMark. -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="14.5" fill="url(#gloss)"/>

  <!-- Two rising chevrons: progress / forward motion. Identical geometry to
       PragatiMark so the brand is consistent everywhere. -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 40 L32 22 L50 40" stroke="#ffffff" stroke-width="7"/>
    <path d="M18 52 L32 38 L46 52" stroke="#B7E4C2" stroke-width="5" opacity="0.92"/>
  </g>
</svg>
